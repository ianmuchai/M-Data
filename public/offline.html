<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BizDATA Offline</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #101828;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 440px;
        padding: 28px;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.07);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.45rem;
      }

      p {
        margin: 0;
        color: #667085;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BizDATA is offline</h1>
      <p>The dashboard shell is cached, but live analytics need a network connection. Reconnect and refresh to resume.</p>
    </main>
  </body>
</html>
